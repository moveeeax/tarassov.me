# ───────────────────────────────────────────────────────────────
# Production overlay TEMPLATE for the cpp-worker chart.
#
# TRACKED — ships with the template. Copy to values-prod.yaml (GITIGNORED) and
# fill in env-specific values. NEVER put real secrets here; pass via --set or
# external-secrets. The datastore + auth settings MUST match the cpp-api release.
#
# Deploy:
#   cp helm/cpp-worker/values-prod.example.yaml helm/cpp-worker/values-prod.yaml
#   helm upgrade --install worker ./helm/cpp-worker -n <namespace> \
#     -f helm/cpp-worker/values-prod.yaml \
#     --set externalDatabase.password="$DB_PASSWORD" \
#     --set externalRedis.password="$REDIS_PASSWORD" \
#     --set auth.jwtSecret="$JWT_SECRET"
#     # add --set mail.smtpPassword=... when mail.enabled=true
#
# Items marked TODO are environment-specific.
# ───────────────────────────────────────────────────────────────

replicaCount: 2

image:
  repository: your-registry/your-project-worker   # init-project.sh rewrites this
  tag: latest
  pullPolicy: Always

nodeSelector:
  kubernetes.io/arch: amd64   # TODO: match your cluster nodes

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

pdb:
  enabled: true
  minAvailable: 1

# ── Worker queues ──────────────────────────────────────────────
worker:
  id: worker-1
  # MUST include account_email + email.send — a worker that only drains "default"
  # silently leaves all transactional email undrained.
  types: "account_email,email.send,webhook.deliver"
  concurrency: 2
  healthPort: 9091
  brpopTimeout: 5

jobs:
  enabled: true
  resultTtl: 86400
  maxRetries: 3

# ── Database (identical to the cpp-api overlay) ────────────────
externalDatabase:
  host: postgresql-rw.db.svc.cluster.local   # TODO
  port: 5432
  name: cpp-api
  user: cpp-api
  password: ""   # NEVER commit — pass via --set or external-secrets
  # Worker concurrency is low → a small pool is plenty.
  # 5 → 2 replicas * (5 + 5) = 20 sockets.
  poolSize: 5
  replicaHost: postgresql-ro.db.svc.cluster.local   # TODO

# ── Redis Sentinel (identical to the cpp-api overlay) ──────────
externalRedis:
  url: "tcp://redis.db.svc.cluster.local:6379"   # TODO
  password: ""   # NEVER commit — pass via --set or external-secrets
  useSentinel: true
  masterName: mymaster
  sentinelNodes: "redis-node-0.redis-headless.db.svc.cluster.local:26379,redis-node-1.redis-headless.db.svc.cluster.local:26379,redis-node-2.redis-headless.db.svc.cluster.local:26379"   # TODO
  poolSize: 20

# ── Auth — the worker signs the JWT links inside transactional emails.
# MUST match the cpp-api overlay exactly (same secret/issuer/audience), or the
# API won't verify the links.
auth:
  mode: jwt
  jwtSecret: ""   # via --set auth.jwtSecret="$JWT_SECRET" — MUST equal the API's
  jwtIssuer: ""
  jwtAudience: ""

# Public URL rendered into confirm/reset links in emails.
app:
  baseUrl: "https://app.example.com"   # TODO: your SPA URL
  name: App

# ── Mail — off until SMTP is provisioned. Flip enabled=true and fill the SMTP
# fields (+ --set mail.smtpPassword=...) to deliver transactional email.
mail:
  enabled: false
  viaJobs: true
  smtpHost: smtp.example.com    # TODO
  smtpPort: 587
  smtpUsername: ""              # TODO
  smtpPassword: ""              # via --set mail.smtpPassword=...
  smtpUseTls: true
  from: noreply@example.com     # TODO
  fromName: App
  subjectPrefix: "[App] "

# ── Observability ──────────────────────────────────────────────
serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics

monitoring:
  alertsEnabled: true
  targetSelector: ""

tracing:
  enabled: true
  otlpEndpoint: "http://jaeger.monitoring.svc.cluster.local:4318/v1/traces"   # TODO

logging:
  level: info
  format: json             # structured JSON logs — required for prod log aggregators
