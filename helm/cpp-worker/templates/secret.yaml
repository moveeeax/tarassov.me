{{- /*
  Fallback Secret rendered from inline values — convenient for dev/CI but
  unsafe for production (secrets end up in Helm release metadata). Use
  externalSecrets.enabled=true to source secrets from Vault/AWS/GCP instead.
*/}}
{{- if and (not .Values.externalSecrets.enabled) (or .Values.externalDatabase.password .Values.externalRedis.password .Values.auth.jwtSecret .Values.mail.smtpPassword) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cpp-worker.fullname" . }}
  labels:
    {{- include "cpp-worker.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.externalDatabase.password }}
  database-password: {{ .Values.externalDatabase.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.externalRedis.password }}
  redis-password: {{ .Values.externalRedis.password | b64enc | quote }}
  {{- end }}
  {{- if .Values.auth.jwtSecret }}
  jwt-secret: {{ .Values.auth.jwtSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.mail.smtpPassword }}
  mail-smtp-password: {{ .Values.mail.smtpPassword | b64enc | quote }}
  {{- end }}
{{- end }}
