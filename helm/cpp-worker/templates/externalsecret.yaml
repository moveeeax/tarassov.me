{{- /*
  ExternalSecret — pulls DATABASE_PASSWORD, JWT_SECRET, REDIS_PASSWORD, and
  MAIL_SMTP_PASSWORD from a cluster secret store (Vault, AWS SSM, GCP Secret
  Manager, …) via the External Secrets Operator, then materializes a regular
  K8s Secret that the Deployment consumes by secretKeyRef.

  Keep the JWT key aligned with the cpp-api chart — the worker signs the same
  transactional-email link tokens.

  Enable with:
    externalSecrets.enabled: true
    externalSecrets.secretStoreRef.name: my-cluster-secret-store
    externalSecrets.secretStoreRef.kind: ClusterSecretStore   # or SecretStore
    externalSecrets.data:
      - secretKey: database-password
        remoteRef: { key: prod/app/db, property: password }
      - secretKey: jwt-secret
        remoteRef: { key: prod/app/auth, property: jwt_secret }

  When disabled, the chart falls back to the bundled Secret rendered from
  static values (see templates/secret.yaml). That fallback is intended for
  dev/test only.
*/}}
{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "cpp-worker.fullname" . }}
  labels:
    {{- include "cpp-worker.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "cpp-worker.fullname" . }}
    creationPolicy: Owner
  data:
    {{- range .Values.externalSecrets.data }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteRef.key }}
        {{- with .remoteRef.property }}
        property: {{ . }}
        {{- end }}
        {{- with .remoteRef.version }}
        version: {{ . }}
        {{- end }}
    {{- end }}
{{- end }}
