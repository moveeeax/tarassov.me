apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cpp-worker.fullname" . }}
  labels:
    {{- include "cpp-worker.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cpp-worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "cpp-worker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: {{ .Values.shutdown.terminationGracePeriodSeconds | default 60 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/app/cpp_api_template_worker"]
          ports:
            - name: health
              containerPort: {{ .Values.worker.healthPort }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep {{ .Values.shutdown.preStopDelay | default 2 }}"]
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path }}
              port: health
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            # Database password — injected from Secret. The binary assembles the
            # DSN from the discrete DATABASE_* parts below; the password is never
            # embedded in a URL env var.
            {{- if .Values.externalDatabase.password }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cpp-worker.fullname" . }}
                  key: database-password
            {{- end }}
            # Database (discrete parts → DSN built in code)
            {{- include "cpp-worker.databaseEnv" . | nindent 12 }}
            - name: DB_POOL_SIZE
              value: {{ .Values.externalDatabase.poolSize | quote }}
            # Migrations — OFF for the worker. The cpp-api init-container owns
            # schema migrations; Core.hpp defaults DB_MIGRATIONS_ENABLED to true,
            # so without this every worker pod would race the API for the
            # migration advisory lock at startup. ternary (not `default false`)
            # so an explicit `false` in values isn't flipped back to true.
            - name: DB_MIGRATIONS_ENABLED
              value: {{ ternary "true" "false" (.Values.externalDatabase.migrationsEnabled | default false) | quote }}
            # Redis / Cache
            {{- if .Values.externalRedis.password }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cpp-worker.fullname" . }}
                  key: redis-password
            {{- end }}
            - name: REDIS_URL
              value: {{ .Values.externalRedis.url | quote }}
            - name: REDIS_USE_SENTINEL
              value: {{ .Values.externalRedis.useSentinel | quote }}
            {{- if .Values.externalRedis.useSentinel }}
            - name: REDIS_MASTER_NAME
              value: {{ .Values.externalRedis.masterName | quote }}
            - name: REDIS_SENTINEL_NODES
              value: {{ .Values.externalRedis.sentinelNodes | quote }}
            {{- end }}
            - name: CACHE_POOL_SIZE
              value: {{ .Values.externalRedis.poolSize | quote }}
            # Jobs
            - name: JOBS_ENABLED
              value: {{ .Values.jobs.enabled | quote }}
            - name: JOBS_RESULT_TTL
              value: {{ .Values.jobs.resultTtl | quote }}
            - name: JOBS_MAX_RETRIES
              value: {{ .Values.jobs.maxRetries | quote }}
            # Worker
            - name: WORKER_ID
              value: {{ .Values.worker.id | quote }}
            - name: WORKER_TYPES
              value: {{ .Values.worker.types | quote }}
            - name: WORKER_CONCURRENCY
              value: {{ .Values.worker.concurrency | quote }}
            - name: WORKER_HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
            - name: WORKER_BRPOP_TIMEOUT
              value: {{ .Values.worker.brpopTimeout | quote }}
            # Logging / Observability
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            - name: LOG_NAME
              value: {{ .Values.logging.name | quote }}
            - name: LOG_FORMAT
              value: {{ .Values.logging.format | quote }}
            - name: SERVICE_NAME
              value: {{ .Values.logging.serviceName | quote }}
            # Tracing / OTLP
            {{- if .Values.tracing.enabled }}
            - name: OTLP_ENDPOINT
              value: {{ .Values.tracing.otlpEndpoint | quote }}
            {{- end }}
            # Auth — the worker signs/renders the tokens embedded in outgoing
            # email links (confirm / reset / change-email). Without JWT_SECRET
            # those links are silently unverifiable, so wire the same secret the
            # API uses (sourced from the chart Secret / ExternalSecret).
            - name: AUTH_MODE
              value: {{ .Values.auth.mode | quote }}
            {{- if .Values.auth.jwtSecret }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "cpp-worker.fullname" . }}
                  key: jwt-secret
            {{- end }}
            {{- if .Values.auth.jwtIssuer }}
            - name: JWT_ISSUER
              value: {{ .Values.auth.jwtIssuer | quote }}
            {{- end }}
            {{- if .Values.auth.jwtAudience }}
            - name: JWT_AUDIENCE
              value: {{ .Values.auth.jwtAudience | quote }}
            {{- end }}
            # Public base URL the worker renders into email links.
            - name: APP_BASE_URL
              value: {{ .Values.app.baseUrl | quote }}
            - name: APP_NAME
              value: {{ .Values.app.name | quote }}
            # Mail — the worker is what actually delivers transactional email
            # (MAIL_VIA_JOBS routes sends through the job queue it drains).
            - name: MAIL_ENABLED
              value: {{ .Values.mail.enabled | quote }}
            {{- if .Values.mail.enabled }}
            - name: MAIL_VIA_JOBS
              value: {{ .Values.mail.viaJobs | quote }}
            - name: MAIL_SMTP_HOST
              value: {{ .Values.mail.smtpHost | quote }}
            - name: MAIL_SMTP_PORT
              value: {{ .Values.mail.smtpPort | quote }}
            {{- if .Values.mail.smtpUsername }}
            - name: MAIL_SMTP_USERNAME
              value: {{ .Values.mail.smtpUsername | quote }}
            {{- end }}
            {{- if .Values.mail.smtpPassword }}
            - name: MAIL_SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "cpp-worker.fullname" . }}
                  key: mail-smtp-password
            {{- end }}
            - name: MAIL_SMTP_USE_TLS
              value: {{ .Values.mail.smtpUseTls | quote }}
            - name: MAIL_FROM
              value: {{ .Values.mail.from | quote }}
            - name: MAIL_FROM_NAME
              value: {{ .Values.mail.fromName | quote }}
            - name: MAIL_SUBJECT_PREFIX
              value: {{ .Values.mail.subjectPrefix | quote }}
            {{- end }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: config
          configMap:
            name: {{ include "cpp-worker.fullname" . }}
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: uploads
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
