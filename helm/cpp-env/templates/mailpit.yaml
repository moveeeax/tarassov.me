{{- if .Values.mailpit.enabled }}
# Mailpit — catches all SMTP from the env (worker mail.smtpHost=mailpit:1025) and
# serves a web UI at mail.<env>. Nothing leaves the cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  labels:
    {{- include "cpp-env.labels" . | nindent 4 }}
    app: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: mailpit
          image: axllent/mailpit:v1.30
          env:
            - { name: MP_SMTP_AUTH_ACCEPT_ANY, value: "1" }
            - { name: MP_SMTP_AUTH_ALLOW_INSECURE, value: "1" }
          ports:
            - { name: smtp, containerPort: 1025 }
            - { name: http, containerPort: 8025 }
          readinessProbe:
            httpGet: { path: /, port: http }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  labels:
    {{- include "cpp-env.labels" . | nindent 4 }}
spec:
  selector:
    app: mailpit
  ports:
    - { name: smtp, port: 1025, targetPort: smtp }
    - { name: http, port: 8025, targetPort: http }
{{- end }}
