{{- if .Values.jaeger.enabled }}
# Jaeger all-in-one — per-env trace store + UI at jaeger.<env>. OTLP on :4318
# (the app's tracing.otlpEndpoint). In-memory storage (ephemeral).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    {{- include "cpp-env.labels" . | nindent 4 }}
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.76.0
          env:
            - { name: COLLECTOR_OTLP_ENABLED, value: "true" }
          ports:
            - { name: otlp-http, containerPort: 4318 }
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: ui, containerPort: 16686 }
          readinessProbe:
            httpGet: { path: /, port: ui }
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    {{- include "cpp-env.labels" . | nindent 4 }}
spec:
  selector:
    app: jaeger
  ports:
    - { name: otlp-http, port: 4318, targetPort: otlp-http }
    - { name: otlp-grpc, port: 4317, targetPort: otlp-grpc }
    - { name: ui, port: 16686, targetPort: ui }
{{- end }}
