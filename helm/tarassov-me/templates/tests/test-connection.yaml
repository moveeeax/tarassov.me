apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "tarassov-me.fullname" . }}-test-connection"
  labels:
    {{- include "tarassov-me.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "tarassov-me.fullname" . }}:{{ .Values.service.httpPort }}/healthz', '-O', '-', '-q']
  restartPolicy: Never
