{{- /*
  PrometheusRule — bundles a minimum-viable alert set that pairs with the
  ServiceMonitor. Requires the prometheus-operator CRDs installed in the
  cluster.

  IMPORTANT: metric selectors depend on how your prometheus-operator
  installation labels scraped targets. Our ServiceMonitor sets
  `app.kubernetes.io/name` / `app.kubernetes.io/instance`, and under the
  default ServiceMonitor → Prometheus pipeline that surfaces as the
  `job` label in a format like "{namespace}/{service}/{port-name}"
  (operator default) or just "{service}" (older configs).

  Rather than guess, we select on `service=` label that we emit ourselves
  via the `monitoring.targetSelector` value. Override it in values.yaml
  to match YOUR cluster's relabel config; the template comment below
  documents the common shapes.
*/}}
{{- if .Values.monitoring.alertsEnabled }}
{{- $selector := .Values.monitoring.targetSelector | default (printf "service=\"%s\"" (include "tarassov-me.fullname" .)) }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "tarassov-me.fullname" . }}
  labels:
    {{- include "tarassov-me.labels" . | nindent 4 }}
    {{- with .Values.monitoring.alertLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: {{ include "tarassov-me.fullname" . }}.rules
      interval: 30s
      rules:
        - alert: CppApiHighErrorRate
          # Fires when >1% of HTTP responses are 5xx over a 5-min window.
          expr: |
            (
              sum(rate(http_requests_total{ {{ $selector }}, status=~"5.."}[5m]))
              /
              clamp_min(sum(rate(http_requests_total{ {{ $selector }} }[5m])), 1)
            ) > {{ .Values.monitoring.thresholds.errorRate | default 0.01 }}
          for: 5m
          labels:
            severity: critical
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#high5xx"
            summary: "High 5xx rate on {{ include "tarassov-me.fullname" . }}"
            description: "More than {{ .Values.monitoring.thresholds.errorRate | default 0.01 }} of requests returned 5xx over 5m."

        - alert: CppApiTargetDown
          # Fires when the scrape target disappears or returns up==0 for 2m.
          # This is the authoritative "is the API reachable?" signal.
          expr: |
            up{ {{ $selector }} } == 0
          for: 2m
          labels:
            severity: critical
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#targetdown"
            summary: "tarassov-me target is down"
            description: "Prometheus cannot scrape {{ include "tarassov-me.fullname" . }} — the pod is gone or the metrics endpoint is unreachable."

        - alert: CppApiDbPoolSaturationHigh
          # Fires when more than 90 % of DB connections are in use for 5 m.
          # A saturated pool means new requests queue for a connection and p99
          # latency climbs before any error surfaces.
          expr: |
            (
              sum by (pool) (db_pool_active_connections{ {{ $selector }} })
              /
              clamp_min(sum by (pool) (db_pool_size{ {{ $selector }} }), 1)
            ) > {{ .Values.monitoring.thresholds.dbPoolSaturation | default 0.9 }}
          for: 5m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#p99"
            summary: "DB connection pool >{{ mulf (.Values.monitoring.thresholds.dbPoolSaturation | default 0.9) 100.0 | int }}% saturated ({{`{{ $labels.pool }}`}} pool)"
            description: "Increase externalDatabase.poolSize or scale replicas to reduce connection pressure."

        {{- if .Values.monitoring.jobsAlerts }}
        # jobs_queue_depth is only published when Jobs is enabled — gate this with
        # the sibling DLQ alerts so a Jobs-less API doesn't ship a dead rule.
        - alert: CppApiJobsQueueBacklog
          # Fires when the total waiting-jobs queue stays elevated for 10 m —
          # the leading indicator that workers can't keep up with submission rate.
          expr: |
            sum(jobs_queue_depth{ {{ $selector }}, type="_total"}) > {{ .Values.monitoring.thresholds.queueDepth | default 100 }}
          for: 10m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#dlq"
            summary: "Jobs queue backlog above {{ .Values.monitoring.thresholds.queueDepth | default 100 }}"
            description: "Waiting-jobs queue is growing — scale the tarassov-me-worker deployment or investigate slow job handlers."
        {{- end }}

        - alert: CppApiHighLatencyP99
          expr: |
            histogram_quantile(
              0.99,
              sum by (le) (rate(http_request_duration_seconds_bucket{ {{ $selector }} }[5m]))
            ) > {{ .Values.monitoring.thresholds.latencyP99Sec | default 1 }}
          for: 10m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#p99"
            summary: "p99 latency over {{ .Values.monitoring.thresholds.latencyP99Sec | default 1 }}s"
            description: "Investigate slow queries, pool saturation, or downstream latency."

        - alert: CppApiHighReplicaLag
          expr: |
            db_replica_lag_seconds{ {{ $selector }} } > {{ .Values.monitoring.thresholds.replicaLagSec | default 10 }}
          for: 5m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            summary: "Read replica lagging > {{ .Values.monitoring.thresholds.replicaLagSec | default 10 }}s behind primary"
            description: "Read-after-write reads may serve stale rows. Check replica health, network, or WAL apply load (only fires when replicas are configured)."

        - alert: CppApiPodNotReady
          expr: |
            kube_pod_status_ready{condition="true", namespace="{{ .Release.Namespace }}", pod=~"{{ include "tarassov-me.fullname" . }}-.*"} == 0
          for: 5m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#targetdown"
            summary: "Pod not ready"
            description: "A pod has been NotReady for 5 minutes — check logs and readiness probe."

        - alert: CppApiCrashLoopBackOff
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}", pod=~"{{ include "tarassov-me.fullname" . }}-.*"}[15m]) > 0
          for: 15m
          labels:
            severity: critical
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#targetdown"
            summary: "Container restarting"
            description: "Container has restarted in the last 15 minutes."

        - alert: CppApiRetriesExhaustedSpike
          # Retries hitting max attempts consistently means a downstream is
          # degraded but the app is soldiering on. Paired with retries_total
          # counter from Retry::run.
          expr: |
            sum(rate(retries_total{ {{ $selector }}, outcome="exhausted"}[5m])) > {{ .Values.monitoring.thresholds.retriesExhaustedPerSec | default 0.5 }}
          for: 10m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#retries"
            summary: "Retries frequently exhausted"
            description: "Downstream is likely degraded — investigate database / cache / messaging health."

        {{- if .Values.monitoring.jobsAlerts }}
        - alert: CppApiJobsDlqGrowing
          # jobs_dlq_depth is labeled by type; the "_total" label is the aggregate.
          expr: |
            sum(jobs_dlq_depth{ {{ $selector }}, type="_total"}) > {{ .Values.monitoring.thresholds.dlqDepth | default 10 }}
          for: 10m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#dlq"
            summary: "Dead-letter queue depth over threshold"
            description: "Investigate repeatedly-failing jobs — inspect /api/jobs/dlq and decide whether to requeue or discard."

        - alert: CppApiJobsDlqSpikeByType
          # One job type alone is accumulating a DLQ backlog fast.
          expr: |
            max by (type) (jobs_dlq_depth{ {{ $selector }}, type!="_total"}) > {{ .Values.monitoring.thresholds.dlqPerTypeDepth | default 5 }}
          for: 10m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#dlq"
            summary: "DLQ growing for job type {{`{{ $labels.type }}`}}"
            description: "A specific job type keeps failing all retries — bug in the handler or a chronically-bad input."

        {{- if .Values.backup.enabled }}
        - alert: CppApiBackupJobFailed
          # The pg_dump CronJob's most recent run failed. Needs kube-state-metrics.
          expr: |
            max(kube_job_status_failed{job_name=~"{{ include "tarassov-me.fullname" . }}-backup.*"}) > 0
          for: 5m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#backup"
            summary: "Postgres backup CronJob failed"
            description: "The latest backup Job failed — no fresh dump was uploaded. Check the Job logs; do not assume a recoverable backup exists."

        - alert: CppApiBackupTooOld
          # No successful backup within the staleness window (default 26h for a
          # daily schedule). Catches a CronJob that is silently broken or descheduled.
          expr: |
            time() - max(kube_job_status_completion_time{job_name=~"{{ include "tarassov-me.fullname" . }}-backup.*"}) > {{ .Values.monitoring.thresholds.backupMaxAgeSeconds | default 93600 }}
          for: 15m
          labels:
            severity: warning
            service: {{ include "tarassov-me.fullname" . }}
          annotations:
            runbook_url: "https://github.com/moveeeax/tarassov.me/blob/main/docs/RUNBOOK.md#backup"
            summary: "No recent Postgres backup"
            description: "No successful backup completed within the staleness window — the CronJob may be broken or no longer scheduled."
        {{- end }}
        {{- end }}
{{- end }}
