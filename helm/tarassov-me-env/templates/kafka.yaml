{{- if .Values.kafka.enabled }}
# Single-broker Kafka in KRaft mode (controller+broker combined). Ephemeral.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels:
    {{- include "tarassov-me-env.labels" . | nindent 4 }}
    app: kafka
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: kafka
          image: apache/kafka:3.8.0
          ports:
            - { name: client, containerPort: 9092 }
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_LOG_DIRS, value: "/tmp/kraft-combined-logs" }
            - { name: CLUSTER_ID, value: "tarassov-me-env-kafka-cluster-1" }
          readinessProbe:
            tcpSocket: { port: client }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { cpu: 100m, memory: 384Mi }
            limits: { cpu: "1", memory: 1Gi }
          volumeMounts:
            - { name: data, mountPath: /tmp/kraft-combined-logs }
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    {{- include "tarassov-me-env.labels" . | nindent 4 }}
spec:
  selector:
    app: kafka
  ports:
    - name: client
      port: 9092
      targetPort: client
{{- end }}
