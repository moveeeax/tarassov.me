{{- /*
  Demo-only: periodically reset the env back to a clean seeded state so public
  abuse / clutter doesn't persist. Truncates the user-generated tables (keeping
  the seeded roles), then re-creates the demo admin and re-seeds sample users.
  Reuses the api ConfigMap (config.json) and Secret (db/redis/jwt) so it connects
  exactly like the running API. Off by default — values-demo.yaml enables it.
*/}}
{{- if .Values.demoReset.enabled }}
{{- $api := index .Values "tarassov-me" -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-reset
  labels:
    {{- include "tarassov-me-env.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.demoReset.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          # 1. Wipe user-generated data; keep the seeded roles. CASCADE clears
          #    rows that reference users. Redis sessions for the deleted users
          #    simply stop resolving — no flush needed.
          initContainers:
            - name: truncate
              image: {{ .Values.demoReset.psqlImage | quote }}
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["sh", "-ec"]
              args:
                - |
                  psql "host={{ $api.externalDatabase.host }} user={{ $api.externalDatabase.user }} dbname={{ $api.externalDatabase.name }}" \
                    -v ON_ERROR_STOP=1 \
                    -c "TRUNCATE users, used_tokens, audit_log RESTART IDENTITY CASCADE;"
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ $api.fullnameOverride | default "api" }}
                      key: database-password
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          # 2. Re-create the demo admin + sample users with the running binary
          #    ($APP_BINARY is set in the image; config.json comes from the api
          #    ConfigMap so DB/Redis/JWT wiring matches the live API exactly).
          containers:
            - name: reseed
              image: "{{ $api.image.repository }}:{{ $api.image.tag }}"
              securityContext:
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              command: ["sh", "-ec"]
              args:
                - |
                  /app/$APP_BINARY config/config.json --create-admin "$ADMIN_EMAIL" "$ADMIN_PASS"
                  /app/$APP_BINARY config/config.json --seed-fake {{ .Values.demoReset.seedCount | default 8 }}
              # No APP_ENV here: this is a one-shot CLI (create-admin/seed-fake),
              # not the serving API, so the prod auth-guard must not apply — it
              # runs as development and exits.
              env:
                - name: DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ $api.fullnameOverride | default "api" }}
                      key: database-password
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ $api.fullnameOverride | default "api" }}
                      key: redis-password
                - name: JWT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ $api.fullnameOverride | default "api" }}
                      key: jwt-secret
                - name: ADMIN_EMAIL
                  value: {{ .Values.demoReset.adminEmail | quote }}
                - name: ADMIN_PASS
                  value: {{ .Values.demoReset.adminPassword | quote }}
              volumeMounts:
                - name: config
                  mountPath: /app/config
                  readOnly: true
                - name: logs
                  mountPath: /app/logs
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config
              configMap:
                name: {{ $api.fullnameOverride | default "api" }}
            - name: logs
              emptyDir: {}
            - name: tmp
              emptyDir: {}
{{- end }}
