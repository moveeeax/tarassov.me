# ═══════════════════════════════════════════════════════════════
# tarassov-me-env — a whole test environment in one namespace.
#
# Deploy a new env (its own namespace; env name drives the *.<env> domain):
#   helm dependency build ./helm/tarassov-me-env
#   helm upgrade --install stage ./helm/tarassov-me-env \
#     -n env-stage --create-namespace \
#     --set env=stage \
#     --set tarassov-me-worker.app.baseUrl=https://app.stage.example.com
#
# Everything else (DB rw/ro URLs, Redis Sentinel, Kafka, OTLP, Mailpit, creds,
# ingress hosts) is wired automatically below. Each env lives in its own
# namespace, so service names are fixed and collision-free across envs.
# ═══════════════════════════════════════════════════════════════

# Environment name — the only required knob. Drives api.<env>/app.<env>/… hosts.
env: dev
baseDomain: example.com

# ── Ingress (umbrella owns all ingress; subchart ingress is disabled) ──
ingress:
  className: nginx
  clusterIssuer: letsencrypt-prod        # cert-manager ClusterIssuer (DNS-01 for wildcard)
  wildcardTlsSecret: ""                  # set to reuse a pre-issued *.<env> cert; "" → per-host certs
  externalDnsTarget: ""                  # external-dns A target (cluster ingress IP); "" → omit annotations

# ── Per-env credentials (TEST ONLY — throwaway envs). Used by the infra
# templates below AND mirrored into the subchart password fields further down;
# keep both in sync (or override all via --set for a sensitive env). ──
credentials:
  dbPassword: "test-db-pass-change-me"
  redisPassword: "test-redis-pass-change-me"
  jwtSecret: "test-jwt-secret-change-me-0123456789abcdef0123456789abcdef"

# ── Infra toggles + sizing ──
postgres:
  instances: 2          # CNPG: 1 primary + (instances-1) replicas → pg-rw / pg-ro
  storageSize: 2Gi
  storageClass: ""      # "" → cluster default
redis:
  enabled: true         # single master + 3 Sentinels (mymaster)
kafka:
  enabled: true         # single-broker KRaft
mailpit:
  enabled: true         # SMTP sink + web UI (mail.<env>)
  ingress:
    # OFF by default: Mailpit's inbox holds reset/confirm/invite tokens. Do NOT
    # publish it to the internet without auth. Flip true only for trusted envs.
    enabled: false      # publish mail.<env> ingress (unauthenticated UI)
jaeger:
  enabled: true         # all-in-one + UI (jaeger.<env>), OTLP on :4318
  ingress:
    # OFF by default: Jaeger UI exposes request traces. Reach it via
    # `kubectl port-forward svc/jaeger 16686` instead of a public ingress.
    enabled: false      # publish jaeger.<env> ingress (unauthenticated UI)

# ── Demo reset (public demo only): periodically wipe user data + reseed so
# abuse/clutter doesn't persist. OFF by default; values-demo.yaml enables it. ──
demoReset:
  enabled: false
  schedule: "0 */6 * * *"           # every 6 hours
  psqlImage: postgres:16-alpine
  adminEmail: admin@demo.tarassov.me
  adminPassword: change-me-demo-pass      # demo admin is intentionally public (README)
  seedCount: 8

# ═══════════════════════════════════════════════════════════════
# Subchart wiring — fixed in-namespace service names, mirrored creds.
# ═══════════════════════════════════════════════════════════════

tarassov-me:
  fullnameOverride: api
  replicaCount: 1
  image:
    repository: docker.io/resert/tarassov-me
    tag: "v1.4.0"
    pullPolicy: Always
  nodeSelector:
    kubernetes.io/arch: amd64
  ingress:
    enabled: false                       # umbrella owns ingress
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 384Mi }
  externalDatabase:
    host: pg-rw
    port: 5432
    name: app
    user: app
    password: "test-db-pass-change-me"   # == credentials.dbPassword
    poolSize: 5
    replicaHost: pg-ro
    migrationsEnabled: false
  migrations:
    runAsInitContainer: true
  externalRedis:
    url: "tcp://redis:6379"
    password: "test-redis-pass-change-me"  # == credentials.redisPassword
    useSentinel: true
    masterName: mymaster
    sentinelNodes: "redis-sentinel:26379"
    poolSize: 5
  externalKafka:
    enabled: true
    brokers: "kafka:9092"
    producerEnabled: false
    consumerEnabled: false
  jobs:
    enabled: true
  # The umbrella always ships tarassov-me-worker, so the API must ENQUEUE account emails
  # (confirm/reset/invite) for the worker to deliver — not try to send inline via
  # its placeholder SMTP. Without viaJobs=true the API's dispatch() falls to
  # deliver_now() against a disabled Mailer and the mail is silently dropped
  # (no job, no email). The worker (tarassov-me-worker.mail.*) does the real delivery.
  mail:
    enabled: true
    viaJobs: true
  tracing:
    enabled: true
    otlpEndpoint: "http://jaeger:4318/v1/traces"
  auth:
    mode: jwt
    jwtSecret: "test-jwt-secret-change-me-0123456789abcdef0123456789abcdef"  # == credentials.jwtSecret
    cookies:
      enabled: true
      secure: true
      samesite: Lax
  serviceMonitor:
    enabled: false

tarassov-me-worker:
  fullnameOverride: worker
  replicaCount: 1
  image:
    repository: docker.io/resert/tarassov-me-worker
    tag: "v1.4.0"
    pullPolicy: Always
  nodeSelector:
    kubernetes.io/arch: amd64
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 384Mi }
  externalDatabase:
    host: pg-rw
    port: 5432
    name: app
    user: app
    password: "test-db-pass-change-me"
    poolSize: 5
    replicaHost: pg-ro
  externalRedis:
    url: "tcp://redis:6379"
    password: "test-redis-pass-change-me"
    useSentinel: true
    masterName: mymaster
    sentinelNodes: "redis-sentinel:26379"
    poolSize: 5
  jobs:
    enabled: true
  auth:
    mode: jwt
    jwtSecret: "test-jwt-secret-change-me-0123456789abcdef0123456789abcdef"
    jwtIssuer: ""
    jwtAudience: ""
  # The public URL baked into email links — the ONE field that needs the env
  # name. Override at install: --set tarassov-me-worker.app.baseUrl=https://app.<env>.example.com
  app:
    baseUrl: "https://app.dev.example.com"
    name: App
  mail:
    enabled: true
    viaJobs: true
    smtpHost: mailpit
    smtpPort: 1025
    smtpUsername: ""
    smtpUseTls: false
    from: noreply@example.com
    fromName: App
    subjectPrefix: "[test] "
  tracing:
    enabled: true
    otlpEndpoint: "http://jaeger:4318/v1/traces"
  serviceMonitor:
    enabled: false

tarassov-me-frontend:
  fullnameOverride: web
  replicaCount: 1
  image:
    repository: docker.io/resert/tarassov-me-frontend
    tag: "v1.4.0"
    pullPolicy: Always
  nodeSelector:
    kubernetes.io/arch: amd64
  backend:
    service: api          # tarassov-me fullnameOverride
    port: 8080
  ingress:
    enabled: false        # umbrella owns ingress
