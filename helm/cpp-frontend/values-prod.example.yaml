# ───────────────────────────────────────────────────────────────
# Production overlay TEMPLATE for the cpp-frontend chart.
#
# TRACKED — ships with the template. Copy to values-prod.yaml (GITIGNORED) and
# fill in the TODOs. The SPA is the single same-origin entry point: it serves
# the bundle and proxies /api → the cpp-api Service, so the API does NOT need
# its own public ingress for browser traffic.
#
# Deploy:
#   cp helm/cpp-frontend/values-prod.example.yaml helm/cpp-frontend/values-prod.yaml
#   helm upgrade --install frontend ./helm/cpp-frontend -n <namespace> \
#     -f helm/cpp-frontend/values-prod.yaml
# ───────────────────────────────────────────────────────────────

replicaCount: 2

image:
  repository: your-registry/your-project-frontend   # init-project.sh rewrites this
  tag: latest
  pullPolicy: Always

nodeSelector:
  kubernetes.io/arch: amd64   # TODO: match your cluster nodes

# cpp-api Service in this namespace (the cpp-api release's fullname).
backend:
  service: api-cpp-api   # TODO: match your cpp-api release fullname
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: app.example.com        # TODO
    external-dns.alpha.kubernetes.io/target: "<your-loadbalancer-ip>" # TODO
  certManager:
    clusterIssuer: letsencrypt-prod
  hosts:
    - host: app.example.com   # TODO: your SPA domain
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cpp-frontend-tls
      hosts:
        - app.example.com     # TODO: same domain

pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi
