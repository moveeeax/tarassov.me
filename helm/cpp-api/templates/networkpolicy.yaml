{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cpp-api.fullname" . }}
  labels:
    {{- include "cpp-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cpp-api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- with .Values.networkPolicy.ingress.fromSelectors }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - port: 8080
          protocol: TCP
    {{- end }}
    {{- with .Values.networkPolicy.ingress.metricsFromSelectors }}
    - from:
        {{- toYaml . | nindent 8 }}
      ports:
        - port: 9090
          protocol: TCP
    {{- end }}
  egress:
    # DNS — required for every cluster egress.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- with .Values.networkPolicy.egress.extra }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
