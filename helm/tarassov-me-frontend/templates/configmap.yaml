apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tarassov-me-frontend.fullname" . }}
  labels:
    {{- include "tarassov-me-frontend.labels" . | nindent 4 }}
data:
  # Overrides the nginx.conf baked into the image. The image hardcodes
  # `proxy_pass http://app:8080` (the docker-compose service name), which does
  # not resolve in Kubernetes — here the /api upstream points at the tarassov-me
  # Service so the SPA stays the single same-origin entry point (cookies remain
  # first-party). $-prefixed tokens are nginx variables, not Helm.
  #
  # KEEP THE ROUTING IN SYNC WITH frontend/nginx.conf — this file must mirror
  # its locations (public site at /, React SPA fallback to /app.html for
  # /login /admin /account…, hashed /assets). A stale copy of this override
  # once shipped `try_files … /index.html` with no SPA locations, which served
  # the BookCard cover for /login and made the admin unreachable.
  default.conf: |
    server {
        # 8080: the image is built FROM nginxinc/nginx-unprivileged, whose
        # master runs as a non-root user and cannot bind privileged ports.
        listen       8080;
        server_name  _;

        root /usr/share/nginx/html;
        index index.html;

        location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

        # Long cache for hashed Vite assets (the React build emits /assets/*).
        location ^~ /assets/ {
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # React app routes (auth/account/admin) → SPA fallback with a STRICT
        # CSP: the Vite bundle has no inline JS, so script-src stays 'self'.
        # Matched ahead of `location /` (regex beats prefix), so the admin
        # never inherits the relaxed public-site policy.
        location ~ ^/(admin|login|register|account|unconfirmed|about)(/|$) {
            try_files $uri /app.html;
            add_header Cache-Control "no-cache" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        }

        # Everything else: serve a real file if present — the BookCard vCard
        # (index.html), blog pages, /css /js /images — otherwise fall back to
        # the React SPA (app.html). The public template ships inline JS and
        # Google Fonts, hence the relaxed policy here (admin stays strict).
        location / {
            try_files $uri $uri/ /app.html;
            add_header Cache-Control "no-cache" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        }

        location /api/ {
            proxy_pass http://{{ .Values.backend.service }}:{{ .Values.backend.port }};
            proxy_set_header Host              $host;
            # Pass through the X-Real-IP the ingress set (the REAL client) — NOT
            # $remote_addr, which is this hop's peer (the ingress pod) and would
            # clobber the client IP the backend audits. When there's no upstream
            # header (reached directly, not via ingress) this is empty and nginx
            # omits it, so the backend falls back to X-Forwarded-For / peer.
            proxy_set_header X-Real-IP         $http_x_real_ip;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }
    }
