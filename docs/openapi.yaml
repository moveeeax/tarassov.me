openapi: 3.1.0
info:
  title: C++ REST API Template
  description: |
    Infrastructure endpoints for the C++ REST API template: health probes
    and a background-job API. Authentication is opt-in (auth.mode=jwt|bearer|none).
    Rate-limiting and idempotency are driven by headers.
  version: 1.0.0
  contact:
    name: Platform team
servers:
  - url: http://localhost:8080
    description: Local dev
  - url: https://api.example.com
    description: Production

# Global security — attached per-operation below where needed.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    # Browser-SPA session: the access JWT travels in an HttpOnly
    # __Host- cookie set by POST /api/auth/login (auth.cookies.* in
    # config/config.json). Same-origin only — the SPA never reads it
    # from JS; fetch sends it via credentials: 'include'.
    cookieAuth:
      type: apiKey
      in: cookie
      name: __Host-access

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Opaque client-generated key. First request with this key + body hash
        is executed and its response cached; subsequent requests replay it.
        Conflicting body with the same key returns 422.
      schema:
        type: string
        maxLength: 256
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C Trace Context header.
      schema:
        type: string
        pattern: '^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }
        code: { type: string }

    ValidationError:
      type: object
      required: [error, errors]
      properties:
        error:
          type: string
          enum: [validation_failed]
        errors:
          type: array
          items:
            type: object
            required: [field, code, message]
            properties:
              field: { type: string }
              code: { type: string }
              message: { type: string }

    # Mirrors Jobs::Job::to_json() in src/jobs/Jobs.hpp.
    Job:
      type: object
      required: [id, type, status, created_at]
      properties:
        id:          { type: string, format: uuid }
        type:        { type: string }
        payload:     { type: object, additionalProperties: true }
        status:
          type: string
          enum: [pending, processing, completed, failed, dead]
        result:      { nullable: true }
        error:       { type: string }
        worker_id:   { type: string }
        trace_id:    { type: string, description: W3C trace id of the submitting request — deep-link into Jaeger }
        retry_count: { type: integer }
        max_retries: { type: integer }
        created_at:  { type: integer, format: int64, description: Epoch seconds }
        updated_at:  { type: integer, format: int64, description: Epoch seconds }

    # Mirrors Domain::to_json(Role) in src/domain/Role.hpp.
    Role:
      type: object
      required: [id, name, permissions, is_default]
      properties:
        id:          { type: integer }
        name:        { type: string }
        permissions: { type: integer, description: Bitmask — Domain::Permission::k* }
        is_default:  { type: boolean }

    # Mirrors Domain::to_json(User) in src/domain/User.hpp.
    # `role` is only present when the row was loaded with its role joined.
    User:
      type: object
      required: [id, email, full_name, confirmed, role_id, created_at, updated_at]
      properties:
        id:         { type: string, format: uuid }
        email:      { type: string, format: email }
        first_name: { type: ['string', 'null'] }
        last_name:  { type: ['string', 'null'] }
        full_name:  { type: string }
        confirmed:  { type: boolean }
        role_id:    { type: integer }
        role:       { $ref: '#/components/schemas/Role' }
        created_at: { type: string }
        updated_at: { type: string }

    UserListResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/User' }
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }

    JobListResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Job' }
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }

    DlqListResponse:
      type: object
      required: [data, count, depth]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Job' }
        count: { type: integer, description: Number of jobs returned (after type filter + limit) }
        depth: { type: integer, description: Total DLQ depth (unfiltered) }

    AuditEntry:
      type: object
      required: [id, action, target_type, details, created_at]
      properties:
        id:          { type: integer, format: int64 }
        actor_id:    { type: string, nullable: true, description: Acting principal subject (uuid), or null for a system action }
        action:      { type: string, description: 'Dotted verb, e.g. user.create' }
        target_type: { type: string, description: 'Affected entity kind, e.g. user / role' }
        target_id:   { type: string, nullable: true, description: Affected entity id (uuid or int as text) }
        details:     { type: object, additionalProperties: true, description: Action-specific context }
        created_at:  { type: string, format: date-time }

    AuditListResponse:
      type: object
      required: [data, total, limit, offset]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AuditEntry' }
        total:  { type: integer }
        limit:  { type: integer }
        offset: { type: integer }

    JobCreate:
      type: object
      required: [type]
      properties:
        type:        { type: string, minLength: 1 }
        payload:     { type: object, additionalProperties: true }
        max_retries: { type: integer, minimum: 0, maximum: 20 }

    # GET /api/auth/me, POST /api/auth/login, POST /api/auth/refresh.
    # Mirrors AuthController::me/login/refresh — Response::ok({{"user", user}}).
    MeResponse:
      type: object
      required: [user]
      properties:
        user: { $ref: '#/components/schemas/User' }

    # GET/PATCH /api/admin/users/{id}, POST /api/admin/users.
    # Mirrors AdminController::getUser/updateUser/createUser —
    # Response::ok/created({{"data", user}}).
    UserDetailResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/User' }

    # POST /api/admin/invite. Mirrors AdminController::inviteUser —
    # Response::created({{"data", user}, {"message", "Invitation sent"}}).
    InviteResponse:
      type: object
      required: [data]
      properties:
        data:    { $ref: '#/components/schemas/User' }
        message: { type: string }

    # GET /api/admin/roles. Mirrors AdminController::listRoles —
    # Response::list({{"data", [...roles]}}).
    RolesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Role' }

    # POST/PATCH /api/admin/roles[/{id}]. Mirrors AdminController::createRole/
    # updateRole — Response::ok({{"data", role}}).
    RoleDetailResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/Role' }

    # Generic "{message: ...}" envelope: logout, delete user/role, etc.
    MessageResponse:
      type: object
      properties:
        message: { type: string }

# -----------------------------------------------------------------------------
paths:
  /:
    get:
      summary: Endpoint discovery — list every registered route
      tags: [health]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  version: { type: string }
                  endpoints:
                    type: array
                    items:
                      type: object
                      required: [method, path, description]
                      properties:
                        method: { type: string }
                        path: { type: string }
                        description: { type: string }
  /healthz:
    get:
      summary: Liveness probe
      tags: [health]
      responses:
        '200':
          description: Process is alive
  /ready:
    get:
      summary: Readiness probe
      tags: [health]
      responses:
        '200': { description: Ready }
        '503': { description: Draining or dependency unhealthy }
  /health:
    get:
      summary: Detailed component health
      tags: [health]
      responses:
        '200': { description: All components healthy }
        '503': { description: One or more components unhealthy }

  # ── Auth ───────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      summary: Register a new user
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:      { type: string, format: email }
                password:   { type: string, minLength: 8, maxLength: 128 }
                first_name: { type: string }
                last_name:  { type: string }
      responses:
        '201':
          description: User created — confirmation email queued
        '400': { description: Validation failed }
        '409': { description: Email already registered }
  /api/v1/auth/login:
    post:
      summary: Log in
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Logged in — Set-Cookie access + refresh
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { description: Invalid email or password }
  /api/v1/auth/logout:
    post:
      summary: Log out (clears cookies + revokes refresh token)
      tags: [auth]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
  /api/v1/auth/refresh:
    post:
      summary: Rotate access + refresh tokens
      tags: [auth]
      responses:
        '200':
          description: New cookies issued
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { description: Refresh token missing / expired / revoked }
  /api/v1/auth/me:
    get:
      summary: Get the authenticated user
      tags: [auth]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { description: Not authenticated }

  # ── Account self-service ───────────────────────────────────────────────────
  /api/v1/account/confirm-resend:
    post:
      summary: Resend the email-confirmation link to the current user
      tags: [account]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Confirmation email queued }
        '401': { description: Not authenticated }
  /api/v1/account/confirm/{token}:
    post:
      summary: Confirm an account from an email link
      tags: [account]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Account confirmed }
        '400': { description: Invalid or expired token }
        '404': { description: User not found }
  /api/v1/account/reset-password-request:
    post:
      summary: Start a password reset (email-based)
      tags: [account]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200': { description: If the email is registered, a reset link is on its way }
  /api/v1/account/reset-password/{token}:
    post:
      summary: Apply a password reset using an email-link token
      tags: [account]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                new_password: { type: string, minLength: 8, maxLength: 128 }
      responses:
        '200': { description: Password updated }
        '400': { description: Invalid or expired token }
  /api/v1/account/change-email-request:
    post:
      summary: Start an email-change flow (verifies password, mails a link to new address)
      tags: [account]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_email, password]
              properties:
                new_email: { type: string, format: email }
                password:  { type: string }
      responses:
        '200': { description: Confirmation email sent to the new address }
        '401': { description: Wrong password or not authenticated }
  /api/v1/account/change-email/{token}:
    post:
      summary: Apply a pending email change from token
      tags: [account]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Email updated }
        '400': { description: Invalid or expired token }
        '409': { description: Email already in use }
  /api/v1/account/join-from-invite/{token}:
    post:
      summary: Set password and confirm account from an invite token
      tags: [account]
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                new_password: { type: string, minLength: 8, maxLength: 128 }
      responses:
        '200': { description: Account ready — the invitee can now sign in }
        '400': { description: Invalid or expired invitation token }
  /api/v1/account/change-password:
    post:
      summary: Change password while logged in (verifies old password)
      tags: [account]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [old_password, new_password]
              properties:
                old_password: { type: string }
                new_password: { type: string, minLength: 8, maxLength: 128 }
      responses:
        '200': { description: Password updated }
        '401': { description: Wrong current password or not authenticated }

  /api/v1/account/api-keys:
    get:
      summary: List your API keys (metadata only; never the secret)
      tags: [account]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: "Array of API key metadata under data[]" }
        '401': { description: Not authenticated }
    post:
      summary: Create an API key — the secret is returned ONCE in this response
      tags: [account]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '201': { description: Key created; `key` field holds the one-time secret }
        '401': { description: Not authenticated }

  /api/v1/account/api-keys/{id}:
    delete:
      summary: Revoke one of your API keys
      tags: [account]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Key revoked }
        '401': { description: Not authenticated }
        '404': { description: No such key (or not yours) }

  # ── Admin (require Permission::ADMINISTER) ────────────────────────────────
  /api/v1/admin/users:
    get:
      summary: List users (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200':
          description: User page
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserListResponse' }
        '403': { description: Not an admin }
    post:
      summary: Create a confirmed user (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:      { type: string, format: email }
                password:   { type: string, minLength: 8, maxLength: 128 }
                first_name: { type: string }
                last_name:  { type: string }
                role_id:    { type: integer }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetailResponse' }
        '400': { description: Validation failed }
        '403': { description: Not an admin }
        '409': { description: Email already registered }
  /api/v1/admin/invite:
    post:
      summary: Invite a user via email (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:      { type: string, format: email }
                first_name: { type: string }
                last_name:  { type: string }
                role_id:    { type: integer }
      responses:
        '201':
          description: Invited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InviteResponse' }
        '403': { description: Not an admin }
        '409': { description: Email already registered }
  /api/v1/admin/users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      summary: User detail (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: User row with role
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetailResponse' }
        '403': { description: Not an admin }
        '404': { description: User not found }
    patch:
      summary: Update user — email / role_id / first_name / last_name (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                email:      { type: string, format: email }
                role_id:    { type: integer }
                first_name: { type: string }
                last_name:  { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDetailResponse' }
        '400': { description: Self role-change refused or validation failed }
        '403': { description: Not an admin }
        '404': { description: User not found }
        '409': { description: Email already taken }
    delete:
      summary: Delete user (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { description: Self-delete refused }
        '403': { description: Not an admin }
        '404': { description: User not found }
  /api/v1/admin/roles:
    get:
      summary: List roles (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RolesResponse' }
        '403': { description: Not an admin }
    post:
      summary: Create a role (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, permissions]
              properties:
                name:        { type: string, minLength: 1, maxLength: 64 }
                permissions: { type: integer, description: Bitmask — see Domain::Permission::k* in src/domain/Role.hpp }
                is_default:  { type: boolean, default: false }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleDetailResponse' }
        '400': { description: Validation failed }
        '403': { description: Not an admin }
        '409': { description: Role name already exists }
  /api/v1/admin/roles/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    patch:
      summary: Update role (admin) — partial; pass any of name / permissions / is_default
      tags: [admin]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                name:        { type: string, minLength: 1, maxLength: 64 }
                permissions: { type: integer }
                is_default:  { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoleDetailResponse' }
        '400': { description: Empty patch or invalid id }
        '403': { description: Not an admin }
        '404': { description: Role not found }
        '409': { description: Role name already exists }
    delete:
      summary: Delete role (admin)
      tags: [admin]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MessageResponse' }
        '400': { description: Default role cannot be deleted }
        '403': { description: Not an admin }
        '404': { description: Role not found }
        '409': { description: Role is referenced by users — reassign first }

  /api/v1/admin/audit:
    get:
      summary: List the audit trail (admin)
      description: Requires the audit-read permission bit (Domain::Permission::kAuditRead); full admins hold it.
      tags: [admin]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: limit,       in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: offset,      in: query, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: action,      in: query, schema: { type: string }, description: Exact action filter, e.g. user.create }
        - { name: actor_id,    in: query, schema: { type: string }, description: Filter by acting principal subject }
        - { name: target_type, in: query, schema: { type: string }, description: Filter by target kind, e.g. user / role }
        - { name: from,        in: query, schema: { type: string, format: date-time }, description: created_at lower bound }
        - { name: to,          in: query, schema: { type: string, format: date-time }, description: created_at upper bound }
      responses:
        '200':
          description: Audit page (newest first)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditListResponse' }
        '403': { description: Missing the audit-read permission }

  /api/v1/jobs:
    get:
      summary: List jobs (admin; newest first, offset-paginated)
      tags: [jobs]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: type,   in: query, schema: { type: string } }
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 20 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200':
          description: "Job page: { data, total, limit, offset }"
          content:
            application/json:
              schema: { $ref: '#/components/schemas/JobListResponse' }
        '403': { description: Not an admin }
    post:
      summary: Submit a background job
      tags: [jobs]
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/JobCreate' }
      responses:
        '201': { description: Submitted }
        '400': { description: Validation failed }

  /api/v1/jobs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      summary: Get job status
      tags: [jobs]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    delete:
      summary: Cancel a pending/processing job
      tags: [jobs]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Cancelled }
        '404': { description: Not found or already finished }

  /api/v1/jobs/dlq:
    get:
      summary: List dead-letter queue jobs
      tags: [jobs]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: type,  in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer, default: 100 } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DlqListResponse' }

  /api/v1/jobs/dlq/{id}/requeue:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Requeue a DLQ job (resets retry_count, pushes to live queue)
      tags: [jobs]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Requeued }
        '404': { description: Not found or not in DLQ }


  /api/v1/posts:
    get:
      summary: List posts (admin; offset-paginated)
      tags: [posts]
      security: [{ BearerAuth: [] }]
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 50 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200': { description: "{ data, total, limit, offset }" }
        '403': { description: Not an admin }
    post:
      summary: Create post (admin)
      tags: [posts]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, title]
              properties:
                slug:    { type: string, minLength: 1, maxLength: 160 }
                title:   { type: string, minLength: 1, maxLength: 255 }
                summary: { type: string }
                body:    { type: string }
                status:  { type: string, enum: [draft, published], default: draft }
      responses:
        '201': { description: Created }
        '400': { description: Validation failed }
        '403': { description: Not an admin }
        '409': { description: Slug already exists }
  /api/v1/posts/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      summary: Get post (admin)
      tags: [posts]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: OK }
        '404': { description: Not found }
    patch:
      summary: Update post (admin)
      tags: [posts]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, title]
              properties:
                slug:    { type: string, minLength: 1, maxLength: 160 }
                title:   { type: string, minLength: 1, maxLength: 255 }
                summary: { type: string }
                body:    { type: string }
                status:  { type: string, enum: [draft, published] }
      responses:
        '200': { description: Updated }
        '400': { description: Validation failed }
        '403': { description: Not an admin }
        '404': { description: Not found }
        '409': { description: Slug already exists }
    delete:
      summary: Delete post (admin)
      tags: [posts]
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: Deleted }
        '404': { description: Not found }
  /api/v1/public/posts:
    get:
      summary: List published posts (public, no auth)
      tags: [posts]
      parameters:
        - { name: limit,  in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: offset, in: query, schema: { type: integer, minimum: 0, default: 0 } }
      responses:
        '200': { description: "{ data, limit, offset } — published posts, newest first" }
  /api/v1/public/posts/{slug}:
    parameters:
      - { name: slug, in: path, required: true, schema: { type: string } }
    get:
      summary: Get a published post by slug (public, no auth)
      tags: [posts]
      responses:
        '200': { description: OK }
        '404': { description: Not found or not published }
