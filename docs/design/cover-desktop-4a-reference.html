<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cover — desktop 4A reference (blog ticker on top)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Cutive+Mono&family=Oswald:wght@500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #e8dcc8; display: flex; justify-content: center; padding: 40px 0; font-family: 'Oswald', sans-serif; }

  .cover {
    position: relative;
    width: 471px;
    height: 658px;
    background: #14110f;
    overflow: hidden;
    box-shadow: 0 12px 32px rgba(0,0,0,0.35);
    display: flex;
    flex-direction: column;
  }

  /* ── Верхняя плашка: имя + блог-тикер ── */
  .cover-title { padding: 18px 24px 0; text-align: center; background: #14110f; }
  .cover-title h1 {
    margin: 0; font-family: 'Alfa Slab One', serif; font-size: 34px; line-height: 1.05;
    color: #fff; text-shadow: 2px 2px 0 #c94c43; letter-spacing: 1px;
  }
  .cover-title p { margin: 4px 0 0; font-family: 'Cutive Mono', monospace; font-size: 17px; color: #f2ece2; }

  /* Блог-строка: жёлтая полоса во всю ширину плашки, целиком ссылка */
  .cover-blog {
    display: flex; align-items: baseline; gap: 10px;
    margin: 12px -24px 0; padding: 9px 24px;
    background: #f4c430; text-decoration: none;
    overflow: hidden; white-space: nowrap;
  }
  .cover-blog .label {
    color: #7e2b24; font-weight: 600; font-size: 12px; letter-spacing: 2px; flex-shrink: 0;
  }
  .cover-blog .headline {
    color: #14110f; font-family: 'Cutive Mono', monospace; font-size: 15px;
    overflow: hidden; text-overflow: ellipsis;
  }
  .cover-blog:hover .headline { text-decoration: underline; }

  /* ── Фото ── */
  .cover-photo {
    position: relative; flex: 1;
    background: url('https://tarassov.me/images/site/cover.jpg') center 22% / cover no-repeat;
  }
  .cover-photo::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 240px;
    background: linear-gradient(0deg, rgba(15,13,16,0.88) 25%, rgba(15,13,16,0));
  }

  .cover-open {
    position: absolute; right: 0; top: 34%; z-index: 2;
    background: #d96459; color: #7e2b24;
    font-weight: 600; font-size: 15px; letter-spacing: 2px;
    padding: 12px 22px 12px 26px;
    clip-path: polygon(14px 0, 100% 0, 100% 100%, 14px 100%, 0 50%);
    text-decoration: none;
  }

  /* ── Статы: один ряд внизу ── */
  .cover-stats {
    position: absolute; left: 28px; right: 28px; bottom: 24px; z-index: 2;
    display: flex; justify-content: space-between; gap: 20px;
  }
  .cover-stats dt { margin: 0; color: #f4c430; font-weight: 600; font-size: 14px; letter-spacing: 2px; }
  .cover-stats dd { margin: 0; color: #fff; font-size: 19px; font-weight: 500; }
</style>
</head>
<body>

<div class="cover">
  <header class="cover-title">
    <h1>MICHAEL TARASSOV</h1>
    <p>Multi-Cloud DevOps Engineer</p>
    <a class="cover-blog" href="blog-single.html?slug=example">
      <span class="label">FROM THE BLOG</span>
      <span class="headline">Zero-downtime Kubernetes upgrades on three clouds</span>
    </a>
  </header>

  <div class="cover-photo">
    <a class="cover-open" href="#/resume">OPEN</a>

    <div class="cover-stats">
      <dl style="margin:0">
        <dt>STACK</dt>
        <dd>Terraform · K8s</dd>
      </dl>
      <dl style="margin:0">
        <dt>CLOUDS</dt>
        <dd>AWS · Azure · GCP</dd>
      </dl>
      <dl style="margin:0">
        <dt>EXPERIENCE</dt>
        <dd>10+ years</dd>
      </dl>
    </div>
  </div>
</div>

</body>
</html>
