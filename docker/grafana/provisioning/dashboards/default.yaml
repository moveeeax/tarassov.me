apiVersion: 1

providers:
  - name: 'tarassov-me'
    orgId: 1
    folder: 'tarassov-me'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      # Walk subdirectories so per-service dashboards stay grouped
      # (tarassov-me, tarassov-me-worker, postgres, redis, kafka).
      foldersFromFilesStructure: true
