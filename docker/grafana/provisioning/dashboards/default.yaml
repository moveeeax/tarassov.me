apiVersion: 1

providers:
  - name: 'cpp-template'
    orgId: 1
    folder: 'cpp-template'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      # Walk subdirectories so per-service dashboards stay grouped
      # (cpp-api, cpp-worker, postgres, redis, kafka).
      foldersFromFilesStructure: true
