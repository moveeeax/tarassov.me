repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v17.0.6
    hooks:
      - id: clang-format
        types_or: [c++, c]
        files: '^(src|tests)/.*\.(hpp|cpp|h)$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: '\.(sh|bash)$|^scripts/[^/]+$'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: openapi-drift
        name: OpenAPI spec is in sync with Api::get_endpoints()
        entry: scripts/check-openapi-drift.sh
        language: script
        # Only run when the spec or the endpoint registry changes — avoids
        # forcing the check on every unrelated edit.
        files: '^(docs/openapi\.yaml|src/api/Endpoints\.hpp)$'
        pass_filenames: false

      - id: openapi-lint
        name: OpenAPI spec passes spectral lint
        # Best-effort: skips silently if neither npx nor docker is available
        # (e.g. minimal CI image), so contributors without Node aren't blocked.
        # Local rule overrides live in .spectral.yaml.
        entry: scripts/lint-openapi.sh
        language: script
        files: '^docs/openapi\.yaml$'
        pass_filenames: false
