name: Bug report
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in the sections below — a minimal
        reproduction is worth a thousand words.

        Do **not** report security vulnerabilities here — see [SECURITY.md](../blob/master/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe, and what did you expect instead?
      placeholder: "`make quickstart` exits with ... but the docs say ..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands, from a clean clone where possible.
      placeholder: |
        1. git clone ... && cd ...
        2. ./scripts/init-project.sh my-svc docker.io/me
        3. make quickstart
        4. ...
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` (or the release tag).
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Docker / Compose version, and whether you run native or in containers.
      placeholder: "macOS 14 (arm64), Docker 27.0, Compose v2.28 — running via `make up`"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Trimmed output — please scrub secrets first.
      render: shell
    validations:
      required: false
