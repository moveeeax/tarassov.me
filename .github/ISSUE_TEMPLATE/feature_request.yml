name: Feature request
description: Suggest an improvement to the template
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This is a **starter template**, so the bar for new features is "does it
        help most forks, or is it better left as an example to copy?" Please make
        the case below.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that the template makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: What would you add or change, and roughly how?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, and why this one is better for a template.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: I'm willing to open a merge/pull request for this
          required: false
