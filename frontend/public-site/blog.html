<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Michael Tarassov — Multi-Cloud DevOps engineer. Notes and blog.">
    <meta name="author" content="Michael Tarassov">

    <title>Blog — Michael Tarassov</title>

    <!-- FAV and TOUCH ICONS -->
    <link rel="icon" type="image/svg+xml" href="images/ico/favicon.svg">
    <link rel="icon" type="image/x-icon" href="images/ico/favicon.ico">
    <link rel="apple-touch-icon" href="images/ico/apple-touch-icon.png"/>

    <!-- FONTS (shared with the article page, layout 1A/2A) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Cutive+Mono&family=Oswald:wght@500;600&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- STYLES (list styles live in main.css next to the .post-1a article set) -->
    <link rel="stylesheet" type="text/css" href="css/normalize.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link class="body-bg-skin" rel="stylesheet" type="text/css" href="css/skins/body-bg/wood.css">

</head>

<!-- blog-page: re-enables native scrolling; post-1a: shared sheet/topbar tokens -->
<body class="classic blog-page post-1a">

    <div class="post-sheet">

        <!-- compact top bar, shared with blog-single (no portrait hero) -->
        <header class="post-topbar">
            <a class="post-wordmark" href="/">M. TARASSOV</a>
            <nav aria-label="Site">
                <a href="/">HOME</a>
                <a class="active" href="blog.html">BLOG</a>
            </nav>
        </header>

        <div class="post-article blog-col">

            <h1 class="blog-title">the blog<span class="blog-title-dot">.</span></h1>
            <p class="blog-subtitle">Notes on Kubernetes, Terraform, CI/CD and running this site's own infrastructure.</p>

            <!-- tag filter: built by js/blog.js from the posts index; stays
                 hidden while no post carries tags (the backend has none today) -->
            <div class="blog-tag-filter" id="blog-tags" hidden></div>

            <!-- post list (filled by js/blog.js from /api/v1/public/posts) -->
            <div class="blog-posts" id="blog-posts">
                <p class="post-loading">Loading…</p>
            </div>

        </div>

        <!-- client-side pagination; hidden while everything fits one page -->
        <nav class="blog-pager" id="blog-pager" hidden aria-label="Pages">
            <a id="blog-pager-newer" href="#">&larr; NEWER</a>
            <span class="blog-pager-page" id="blog-pager-page"></span>
            <a id="blog-pager-older" href="#">OLDER &rarr;</a>
        </nav>

        <footer class="post-footer">&copy; 2026 Michael Tarassov</footer>

    </div>

    <!-- SCRIPTS (vanilla; no jquery/book machinery on the list page) -->
    <script src="js/blog.js"></script>

</body>
</html>
