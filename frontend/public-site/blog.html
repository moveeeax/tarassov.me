<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Field notes from production — Kubernetes, Terraform, multi-cloud and cost optimization write-ups by Michael Tarassov.">
    <meta name="author" content="Michael Tarassov">

    <title>Blog — Michael Tarassov</title>

    <link rel="canonical" href="https://tarassov.me/blog.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="tarassov.me">
    <meta property="og:title" content="Blog — Michael Tarassov">
    <meta property="og:description" content="Field notes from production — Kubernetes, Terraform, multi-cloud and cost optimization.">
    <meta property="og:url" content="https://tarassov.me/blog.html">
    <meta property="og:image" content="https://tarassov.me/images/site/og.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://tarassov.me/images/site/og.jpg">

    <!-- FAV and TOUCH ICONS -->
    <link rel="icon" type="image/svg+xml" href="images/ico/favicon.svg">
    <link rel="icon" type="image/x-icon" href="images/ico/favicon.ico">
    <link rel="apple-touch-icon" href="images/ico/apple-touch-icon.png"/>

    <!-- FONTS: IBM Plex Mono for UI accents; Helvetica (system) for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Self-contained blog styling (no book/main.css chrome here) -->
    <link rel="stylesheet" type="text/css" href="css/normalize.css">
    <link rel="stylesheet" type="text/css" href="css/blog.css">

</head>

<body class="blog">

    <div class="blog-frame">

        <nav class="blog-nav">
            <a class="wordmark" href="/">M. TARASSOV</a>
            <div class="links">
                <a href="/">HOME</a>
                <a class="active" href="blog.html">BLOG</a>
            </div>
        </nav>

        <header class="blog-header">
            <div class="blog-eyebrow">FIELD NOTES FROM PRODUCTION</div>
            <h1 class="blog-h1">the blog.</h1>
            <p class="blog-sub">Write-ups on Kubernetes, Terraform, multi-cloud cost, Linux internals, the DevOps career, and the occasional algorithm. Filter by topic — click a tag.</p>
        </header>

        <!-- Filter panel: tag cloud + result label, built by js/blog.js -->
        <section class="blog-filter" id="blog-filter" hidden>
            <div class="blog-filter-head">
                <div class="blog-filter-label">FILTER BY TOPIC</div>
                <div class="blog-filter-result">
                    <span id="blog-result"></span>
                    <button type="button" class="blog-clear" id="blog-clear" hidden>CLEAR ✕</button>
                </div>
            </div>
            <div class="blog-cloud" id="blog-cloud"></div>
        </section>

        <!-- Article list (filled by js/blog.js from /api/v1/public/posts) -->
        <main class="blog-list" id="blog-posts">
            <p class="blog-loading">Loading…</p>
        </main>

        <!-- Pagination (js/blog.js; shown only when >1 page) -->
        <div id="blog-pager" hidden></div>

        <footer class="blog-footer">
            <span>© 2026 MICHAEL TARASSOV</span>
            <a href="https://github.com/moveeeax">GITHUB →</a>
        </footer>

    </div>

    <script src="js/blog.js"></script>

</body>
</html>
