<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A field note from production by Michael Tarassov — Kubernetes, Terraform, multi-cloud, cost optimization.">
    <meta name="author" content="Michael Tarassov">

    <title>Michael Tarassov</title>

    <!-- Per-post title is set client-side (js/blog.js); these are the static
         fallbacks crawlers and link previews see before JS runs. -->
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="tarassov.me">
    <meta property="og:title" content="Field notes — Michael Tarassov">
    <meta property="og:description" content="A field note from production — Kubernetes, Terraform, multi-cloud, cost optimization.">
    <meta property="og:image" content="https://tarassov.me/images/site/og.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://tarassov.me/images/site/og.jpg">

    <!-- FAV and TOUCH ICONS -->
    <link rel="icon" type="image/svg+xml" href="images/ico/favicon.svg">
    <link rel="icon" type="image/x-icon" href="images/ico/favicon.ico">
    <link rel="apple-touch-icon" href="images/ico/apple-touch-icon.png"/>

    <!-- FONTS: IBM Plex Mono for UI accents / code; Helvetica (system) for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Self-contained blog styling (no book/main.css chrome here) -->
    <link rel="stylesheet" type="text/css" href="css/normalize.css">
    <link rel="stylesheet" type="text/css" href="css/blog.css">

</head>

<body class="blog">

    <!-- Scroll progress bar (width driven by js/blog.js) -->
    <div class="blog-progress" id="blog-progress"></div>

    <div class="blog-frame">
        <nav class="blog-nav">
            <a class="wordmark" href="/">M. TARASSOV</a>
            <div class="links">
                <a href="/">HOME</a>
                <a class="active" href="blog.html">BLOG</a>
            </div>
        </nav>
    </div>

    <!-- filled by js/blog.js from /api/v1/public/posts/{slug} -->
    <article class="blog-article">

        <header class="blog-post-head">
            <a class="blog-back" href="blog.html">← ALL NOTES</a>
            <div class="blog-post-topic" id="post-topic" hidden></div>
            <h1 class="blog-post-title" id="post-title" hidden>Loading…</h1>
            <p class="blog-post-dek" id="post-dek" hidden></p>
            <div class="blog-post-meta" id="post-meta" hidden></div>
        </header>

        <div class="blog-body" id="post-content">
            <p class="blog-loading">Loading…</p>
        </div>

        <div class="blog-post-tags" id="post-tags" hidden></div>

        <!-- prev/next from the public posts index (date order); js/blog.js
             hides a side with no neighbour, or the whole bar -->
        <nav class="blog-post-nav" id="post-pager" hidden aria-label="Adjacent posts">
            <a id="pager-prev" class="prev" hidden>
                <div class="label">← PREVIOUS</div>
                <div class="title"></div>
            </a>
            <a id="pager-next" class="next" hidden>
                <div class="label">NEXT →</div>
                <div class="title"></div>
            </a>
        </nav>

    </article>

    <div class="blog-frame">
        <footer class="blog-footer">
            <span>© 2026 MICHAEL TARASSOV</span>
            <a href="https://github.com/moveeeax">GITHUB →</a>
        </footer>
    </div>

    <!-- SCRIPTS (vanilla: no jquery/book machinery on the article page) -->
    <script src="js/marked.min.js"></script>
    <script src="js/blog.js"></script>

</body>
</html>
