<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Michael Tarassov — Multi-Cloud DevOps engineer. Notes and blog.">
    <meta name="author" content="Michael Tarassov">

    <title>Michael Tarassov</title>

    <!-- FAV and TOUCH ICONS -->
    <link rel="shortcut icon" href="images/ico/favicon.ico">
    <link rel="apple-touch-icon" href="images/ico/apple-touch-icon.png"/>

    <!-- FONTS (article layout 1A: wordmark/h1 Alfa Slab One, meta/code Cutive
         Mono, nav/h2 Oswald, body PT Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Cutive+Mono&family=Oswald:wght@500;600&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- STYLES (article styles live in main.css under .post-1a) -->
    <link rel="stylesheet" type="text/css" href="css/normalize.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link class="body-bg-skin" rel="stylesheet" type="text/css" href="css/skins/body-bg/wood.css">

</head>

<!-- blog-page: re-enables native scrolling (main.css keeps body overflow:hidden
     for the book mechanics on the vCard page). post-1a scopes the article styles. -->
<body class="classic blog-page post-1a">

    <div class="post-sheet">

        <!-- compact top bar (no portrait hero on the article page) -->
        <header class="post-topbar">
            <a class="post-wordmark" href="/">M. TARASSOV</a>
            <nav aria-label="Site">
                <a href="/">HOME</a>
                <a class="active" href="blog.html">BLOG</a>
            </nav>
        </header>

        <!-- filled by js/blog.js from /api/v1/public/posts/{slug} -->
        <article class="post-article">
            <div class="post-meta" id="post-meta" hidden></div>
            <h1 class="post-title" id="post-title" hidden>Loading…</h1>
            <div class="post-tags" id="post-tags" hidden></div>
            <div class="post-body" id="post-content">
                <p class="post-loading">Loading…</p>
            </div>
        </article>

        <!-- prev/next from the public posts index (date order); js/blog.js
             hides a side with no neighbour, or the whole bar -->
        <nav class="post-pager" id="post-pager" hidden aria-label="Adjacent posts">
            <a id="pager-prev" hidden>
                <span class="post-pager-label">&larr; PREVIOUS</span>
                <span class="post-pager-title"></span>
            </a>
            <a id="pager-next" hidden>
                <span class="post-pager-label">NEXT &rarr;</span>
                <span class="post-pager-title"></span>
            </a>
        </nav>

        <footer class="post-footer">&copy; 2026 Michael Tarassov</footer>

    </div>

    <!-- SCRIPTS (vanilla: no jquery/book machinery on the article page) -->
    <script src="js/marked.min.js"></script>
    <script src="js/blog.js"></script>

</body>
</html>
