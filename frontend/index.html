<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>C++ REST Template</title>
    <!-- Theme class first, then first-paint colors. Order matters: the style
         below keys off .dark, so theme.js must run before it. External script
         (not inline) so production CSP script-src 'self' covers it. -->
    <script src="/theme.js"></script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
      }
      /* Dark is the default app theme (theme.js adds .dark unless theme=light). */
      html.dark,
      html.dark body {
        background: #09090b;
        color: #fafafa;
      }
      html:not(.dark),
      html:not(.dark) body {
        background: #ffffff;
        color: #09090b;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
