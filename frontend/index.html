<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>C++ REST Template</title>
    <!-- Sets the initial theme before first paint to avoid a flash. Kept as an
         external /theme.js (not inline) so the production CSP script-src 'self'
         covers it without a nonce/sha256. No defer/module: it must run before
         the body paints, exactly like the old inline script. -->
    <script src="/theme.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
