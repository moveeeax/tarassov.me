# SPA + API proxy. The frontend container is the only entry point in
# this stack — it serves the static bundle and forwards /api/* to the
# backend container, so cookies stay first-party from the browser's
# point of view (SameSite=Lax keeps them on).

server {
    # 8080: unprivileged port so the nginx master can run as a non-root user
    # (the image is built FROM nginxinc/nginx-unprivileged).
    listen       8080;
    server_name  _;

    # Liveness for the docker-compose healthcheck.
    location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

    # Static assets. Long cache for hashed chunks; short cache for
    # index.html so a redeploy lands immediately.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        # Security headers for the SPA HTML. NOTE: nginx add_header does not
        # inherit into a location that sets its own — so these are repeated per
        # block rather than declared once at server level. HSTS is only honoured
        # over HTTPS (harmless when TLS terminates in front of this container).
        # Tune the CSP to your bundle: 'unsafe-inline' on style-src covers
        # Tailwind/Radix runtime styles; Vite scripts are external chunks so
        # script-src stays 'self'.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # API proxy. `app` is the docker-compose service name; the same
    # network is shared.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
