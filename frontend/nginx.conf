# Single entry point for the stack:
#   /                      → public BookCard static site (index.html vCard + blog)
#   /login /account/* /admin/* … → React SPA fallback (app.html)
#   /assets/*              → hashed Vite chunks
#   /api/*                → proxied to the backend (app:8080), same-origin cookies
#
# The frontend container serves the static bundles and forwards /api/* to the
# backend container, so cookies stay first-party (SameSite=Lax keeps them on).
#
# NOTE: nginx `add_header` does NOT inherit into a location that sets its own,
# so the security headers are repeated in the content location rather than
# declared once at server level.

server {
    # 8080: unprivileged port so the nginx master can run as a non-root user
    # (the image is built FROM nginxinc/nginx-unprivileged).
    listen       8080;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Liveness for the docker-compose / k8s healthcheck.
    location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

    # Long cache for hashed Vite assets (the React build emits /assets/*).
    location ^~ /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Everything else: serve a real file if present — the BookCard vCard
    # (index.html), blog pages, and its /css /js /images — otherwise fall back
    # to the React SPA (app.html) for /login, /account/*, /admin/*, etc.
    location / {
        try_files $uri $uri/ /app.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # 'unsafe-inline' on script-src is required by the BookCard template's
        # inline JS. This location serves both the public site and the React
        # fallback, so a single relaxed CSP applies. TODO: externalize the
        # template's inline scripts and split per-path to keep the admin strict.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # API proxy. `app` is the docker-compose service name; same network shared.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
