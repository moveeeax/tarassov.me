# Single entry point for the stack:
#   /        → public BookCard static site (vCard + blog)
#   /admin/  → React admin SPA (Vite, built with base=/admin/)
#   /api/    → proxied to the backend (app:8080), same-origin cookies
#
# The frontend container serves the static bundles and forwards /api/* to the
# backend container, so cookies stay first-party (SameSite=Lax keeps them on).

server {
    # 8080: unprivileged port so the nginx master can run as a non-root user
    # (the image is built FROM nginxinc/nginx-unprivileged).
    listen       8080;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Liveness for the docker-compose / k8s healthcheck.
    location = /healthz { return 200 'ok'; add_header Content-Type text/plain; }

    # ── Public BookCard site (/) ──────────────────────────────────────────
    # Static multi-page site. Relaxed CSP: the purchased template ships inline
    # scripts/styles and loads Google Fonts; the blog fetches the same-origin
    # public API (connect-src 'self').
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # ── React admin SPA (/admin) ─────────────────────────────────────────
    # Built with base=/admin/. Strict CSP: external Vite chunks, no inline JS
    # ('unsafe-inline' kept only on style-src for Tailwind/Radix runtime styles).
    location = /admin { return 301 /admin/; }
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
    }

    # Long cache for hashed admin assets (Vite emits /admin/assets/*).
    location /admin/assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── API proxy ────────────────────────────────────────────────────────
    # `app` is the docker-compose service name; same network is shared.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
